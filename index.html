<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hogwarts Board Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --dark-gold: #8b6914;
  --parchment: #f5e6c8; --parchment-dark: #e8d5a3;
  --gryffindor: #740001; --slytherin: #1a472a;
  --ravenclaw: #0e1a40; --hufflepuff: #ecb939;
  --ink: #2c1810; --gem: #5b9bd5; --gem-dark: #2e6da4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a0a00;
  font-family: 'Cinzel', serif;
  color: var(--ink);
  min-height: 100vh;
  background-image: radial-gradient(ellipse at top, #2d1200 0%, #0a0400 100%);
}

/* ── SETUP ── */
#setup-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:100vh; padding:2rem; gap:2rem;
}
.hogwarts-title h1 {
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2rem,6vw,4rem); color:var(--gold);
  text-shadow:0 0 30px rgba(201,168,76,.6),2px 2px 0 var(--dark-gold);
  text-align:center;
}
.hogwarts-title p {
  font-family:'IM Fell English',serif; font-style:italic;
  color:var(--parchment-dark); font-size:1.1rem; text-align:center; opacity:.8;
}
.setup-card {
  background:linear-gradient(135deg,var(--parchment),var(--parchment-dark));
  border:3px solid var(--gold); border-radius:4px;
  padding:2rem 2.5rem; max-width:600px; width:100%;
  box-shadow:0 8px 40px rgba(44,24,16,.4);
}
.setup-card h2 {
  font-family:'Cinzel Decorative',serif; font-size:1.2rem;
  color:var(--dark-gold); text-align:center; margin-bottom:1.5rem;
}
.player-count-selector { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; margin-bottom:1.5rem; }
.count-btn {
  width:48px; height:48px; border-radius:50%;
  border:2px solid var(--dark-gold); background:white;
  font-family:'Cinzel',serif; font-weight:600; font-size:1.1rem;
  cursor:pointer; color:var(--dark-gold); transition:all .2s;
}
.count-btn.active,.count-btn:hover { background:var(--dark-gold); color:white; transform:scale(1.1); }
#players-form { display:flex; flex-direction:column; gap:.7rem; margin-bottom:1.5rem; max-height:320px; overflow-y:auto; }
.player-row { display:flex; align-items:center; gap:.7rem; }
.house-dot { width:28px; height:28px; border-radius:50%; flex-shrink:0; border:2px solid white; box-shadow:0 2px 6px rgba(44,24,16,.4); }
.player-row input { flex:1; padding:.5rem .8rem; border:2px solid var(--gold); border-radius:4px; font-family:'Cinzel',serif; font-size:.9rem; background:white; color:var(--ink); }
.house-select { padding:.5rem; border:2px solid var(--gold); border-radius:4px; font-family:'Cinzel',serif; font-size:.8rem; background:white; color:var(--ink); cursor:pointer; }
.start-btn {
  width:100%; padding:1rem;
  background:linear-gradient(135deg,var(--dark-gold),var(--gold));
  border:none; border-radius:4px;
  font-family:'Cinzel Decorative',serif; font-size:1.1rem;
  color:white; cursor:pointer; letter-spacing:.05em;
  transition:all .2s; box-shadow:0 4px 15px rgba(139,105,20,.4);
}
.start-btn:hover { transform:translateY(-2px); }

/* ── GAME ── */
#game-screen { display:none; min-height:100vh; padding:1rem; }
.game-layout {
  display:grid;
  grid-template-columns:200px 1fr 200px;
  gap:1rem; max-width:1300px; margin:0 auto;
}

/* ── PLAYER CARDS ── */
.players-panel { display:flex; flex-direction:column; gap:.6rem; }
.player-card {
  background:linear-gradient(135deg,var(--parchment),var(--parchment-dark));
  border:2px solid var(--gold); border-radius:4px;
  padding:.6rem; transition:all .3s; position:relative;
}
.player-card.active-turn { border-color:#fff; box-shadow:0 0 20px rgba(201,168,76,.8); transform:scale(1.03); }
.player-name { font-size:.82rem; font-weight:600; color:var(--ink); margin-bottom:.3rem; display:flex; align-items:center; gap:.4rem; }
.stats { display:flex; gap:.4rem; flex-wrap:wrap; font-size:.72rem; }
.stat-badge { display:flex; align-items:center; gap:.2rem; background:white; border-radius:12px; padding:.15rem .45rem; border:1px solid var(--gold); font-weight:600; }
.stat-badge.gems { color:var(--gem-dark); }
.stat-badge.pts { color:var(--gryffindor); }
.jail-badge { position:absolute; top:4px; right:4px; background:var(--gryffindor); color:white; font-size:.6rem; padding:1px 5px; border-radius:8px; }

/* ── TURN INFO (side) ── */
.turn-side-info {
  background:linear-gradient(135deg,var(--parchment),var(--parchment-dark));
  border:2px solid var(--gold); border-radius:4px;
  padding:.7rem; text-align:center; margin-bottom:.5rem;
}
.turn-side-info .label { font-size:.65rem; color:var(--dark-gold); opacity:.8; }
.turn-side-info .player-name-big { font-family:'Cinzel Decorative',serif; font-size:.8rem; color:var(--dark-gold); margin-top:.2rem; }

/* ── BOARD ── */
.board-center { display:flex; flex-direction:column; align-items:center; gap:.8rem; }
.board-wrapper {
  position:relative;
  width:100%; max-width:680px;
  aspect-ratio:1;
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.7);
}
.board-wrapper img.board-bg {
  width:100%; height:100%;
  object-fit:cover; display:block;
  border-radius:4px;
}
/* Transparent clickable cells over the image */
.board-overlay {
  position:absolute; inset:0;
  display:grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(10,1fr);
  pointer-events:none;
}
.overlay-cell {
  position:relative;
  pointer-events:all;
  cursor:pointer;
  border-radius:2px;
  transition:background .15s;
}
.overlay-cell:hover { background:rgba(201,168,76,.25); }
.overlay-cell.active-cell { background:rgba(201,168,76,.4) !important; outline:2px solid gold; }

/* Pawns */
.pawn {
  position:absolute;
  width:22px; height:22px;
  border-radius:50%;
  border:2px solid white;
  box-shadow:0 2px 6px rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem;
  z-index:20;
  transition:all .5s ease;
  pointer-events:none;
}

/* ── DICE AREA ── */
.dice-area {
  background:linear-gradient(135deg,var(--parchment),var(--parchment-dark));
  border:2px solid var(--gold); border-radius:4px;
  padding:.8rem 1.2rem; display:flex;
  align-items:center; justify-content:space-between;
  width:100%; max-width:680px; gap:1rem;
}
.dice-left { display:flex; align-items:center; gap:.8rem; }
#dice-display { font-size:2.8rem; cursor:pointer; user-select:none; filter:drop-shadow(0 3px 6px rgba(0,0,0,.3)); }
#dice-display.rolling { animation:diceRoll .6s ease-out; }
@keyframes diceRoll {
  0%{transform:rotate(0) scale(1)} 25%{transform:rotate(90deg) scale(1.2)}
  50%{transform:rotate(180deg) scale(.9)} 75%{transform:rotate(270deg) scale(1.1)}
  100%{transform:rotate(360deg) scale(1)}
}
.roll-btn {
  padding:.6rem 1.6rem;
  background:linear-gradient(135deg,var(--dark-gold),var(--gold));
  border:none; border-radius:4px;
  font-family:'Cinzel',serif; font-weight:600; font-size:.95rem;
  color:white; cursor:pointer; transition:all .2s;
}
.roll-btn:hover:not(:disabled) { transform:translateY(-2px); filter:brightness(1.1); }
.roll-btn:disabled { opacity:.4; cursor:not-allowed; }

/* ── LOG ── */
.game-log {
  background:linear-gradient(135deg,var(--parchment),var(--parchment-dark));
  border:2px solid var(--gold); border-radius:4px;
  padding:.7rem; max-height:160px; overflow-y:auto;
  width:100%; max-width:680px;
}
.game-log h3 { font-size:.72rem; color:var(--dark-gold); margin-bottom:.4rem; font-family:'Cinzel Decorative',serif; }
.log-entry { font-family:'IM Fell English',serif; font-size:.73rem; color:var(--ink); padding:.18rem 0; border-bottom:1px solid rgba(201,168,76,.2); line-height:1.4; }

/* ── MODAL ── */
#activity-modal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.85); z-index:100;
  align-items:center; justify-content:center;
  padding:1rem; backdrop-filter:blur(4px);
}
#activity-modal.show { display:flex; }
.modal-card {
  background:linear-gradient(135deg,var(--parchment),var(--parchment-dark));
  border:3px solid var(--gold); border-radius:6px;
  padding:2rem; max-width:500px; width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
  text-align:center; animation:modalIn .3s ease-out;
}
@keyframes modalIn { from{transform:scale(.8) translateY(30px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
.modal-card .big-icon { font-size:3rem; margin-bottom:.5rem; display:block; }
.modal-card h2 { font-family:'Cinzel Decorative',serif; font-size:1.25rem; color:var(--dark-gold); margin-bottom:.3rem; }
.modal-type-badge { display:inline-block; padding:.2rem .8rem; border-radius:20px; font-size:.7rem; font-weight:600; margin-bottom:1rem; text-transform:uppercase; letter-spacing:.08em; }
.activity-desc { font-family:'IM Fell English',serif; font-size:1rem; color:var(--ink); margin-bottom:.8rem; line-height:1.6; font-style:italic; }
.activity-instruction { background:white; border:1px solid var(--gold); border-radius:4px; padding:.8rem; font-size:.88rem; color:var(--ink); margin-bottom:1rem; line-height:1.5; font-family:'Cinzel',serif; }
.reward-text { font-size:.85rem; color:var(--dark-gold); font-weight:600; margin-bottom:1rem; }
.modal-buttons { display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap; }
.btn-success { padding:.6rem 1.4rem; background:linear-gradient(135deg,#1a5c2a,#2e8b57); border:none; border-radius:4px; color:white; font-family:'Cinzel',serif; font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-fail { padding:.6rem 1.4rem; background:linear-gradient(135deg,#8b0000,#c0392b); border:none; border-radius:4px; color:white; font-family:'Cinzel',serif; font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-neutral { padding:.6rem 1.4rem; background:linear-gradient(135deg,var(--dark-gold),var(--gold)); border:none; border-radius:4px; color:white; font-family:'Cinzel',serif; font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-success:hover,.btn-fail:hover,.btn-neutral:hover { transform:translateY(-2px); filter:brightness(1.1); }
#timer-bar { width:100%; height:6px; background:#ddd; border-radius:3px; margin-bottom:.8rem; display:none; }
#timer-fill { height:100%; background:linear-gradient(90deg,#2e8b57,#ffd700,#c0392b); border-radius:3px; transition:width .1s linear; }
.gem-warning { background:linear-gradient(135deg,#fff3cd,#ffc107); border:2px solid #ffc107; border-radius:4px; padding:.7rem; margin-bottom:.8rem; font-size:.88rem; font-family:'Cinzel',serif; color:var(--ink); }

/* ── WINNER ── */
#winner-screen {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.92); z-index:200;
  align-items:center; justify-content:center;
  flex-direction:column; gap:1.5rem; text-align:center; padding:2rem;
}
#winner-screen.show { display:flex; }
#winner-screen h1 { font-family:'Cinzel Decorative',serif; font-size:clamp(2rem,6vw,4rem); color:var(--gold); text-shadow:0 0 40px rgba(201,168,76,.8); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
#winner-name { font-size:clamp(1.4rem,4vw,2.2rem); color:white; font-family:'Cinzel',serif; }
.play-again-btn { padding:1rem 2.5rem; background:linear-gradient(135deg,var(--dark-gold),var(--gold)); border:none; border-radius:4px; font-family:'Cinzel Decorative',serif; font-size:1.1rem; color:white; cursor:pointer; transition:all .2s; margin-top:1rem; }
.play-again-btn:hover { transform:scale(1.05); }

/* House colors */
.house-G { background:var(--gryffindor)!important; }
.house-S { background:var(--slytherin)!important; }
.house-R { background:var(--ravenclaw)!important; }
.house-H { background:var(--hufflepuff)!important; }

@media(max-width:900px) {
  .game-layout { grid-template-columns:1fr; }
  .players-panel { flex-direction:row; flex-wrap:wrap; }
  .player-card { min-width:140px; flex:1; }
}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen">
  <div class="hogwarts-title">
    <h1>⚡ HOGWARTS ⚡</h1>
    <p>El Gran Juego de Magia</p>
  </div>
  <div class="setup-card">
    <h2>¿Cuántos jugadores?</h2>
    <div class="player-count-selector">
      <button class="count-btn" onclick="setPlayerCount(2,this)">2</button>
      <button class="count-btn" onclick="setPlayerCount(3,this)">3</button>
      <button class="count-btn active" onclick="setPlayerCount(4,this)">4</button>
      <button class="count-btn" onclick="setPlayerCount(5,this)">5</button>
      <button class="count-btn" onclick="setPlayerCount(6,this)">6</button>
      <button class="count-btn" onclick="setPlayerCount(7,this)">7</button>
      <button class="count-btn" onclick="setPlayerCount(8,this)">8</button>
    </div>
    <div id="players-form"></div>
    <button class="start-btn" onclick="startGame()">🧙 ¡Que comience la magia!</button>
  </div>
</div>

<!-- GAME -->
<div id="game-screen">
  <div class="game-layout">
    <!-- LEFT PLAYERS -->
    <div class="players-panel" id="left-panel">
      <div class="turn-side-info">
        <div class="label">TURNO ACTUAL</div>
        <div class="player-name-big" id="turn-info-left">—</div>
      </div>
    </div>

    <!-- CENTER -->
    <div class="board-center">
      <div class="board-wrapper" id="board-wrapper">
        <img class="board-bg" id="board-img" src="" alt="Tablero Hogwarts"/>
        <div class="board-overlay" id="board-overlay"></div>
        <!-- pawns injected here -->
      </div>
      <div class="dice-area">
        <div class="dice-left">
          <div id="dice-display" onclick="rollDice()">🎲</div>
          <button class="roll-btn" id="roll-btn" onclick="rollDice()">Lanzar Dado</button>
        </div>
        <div style="font-family:'IM Fell English',serif;font-style:italic;font-size:.85rem;color:var(--dark-gold);text-align:right">
          Meta: <strong>200 pts</strong>
        </div>
      </div>
      <div class="game-log">
        <h3>📜 Crónica de Hogwarts</h3>
        <div id="log-entries"></div>
      </div>
    </div>

    <!-- RIGHT PLAYERS -->
    <div class="players-panel" id="right-panel"></div>
  </div>
</div>

<!-- MODAL -->
<div id="activity-modal">
  <div class="modal-card">
    <span class="big-icon" id="modal-icon"></span>
    <h2 id="modal-title"></h2>
    <span class="modal-type-badge" id="modal-badge"></span>
    <div class="activity-desc" id="modal-desc"></div>
    <div class="activity-instruction" id="modal-instruction"></div>
    <div id="timer-bar"><div id="timer-fill"></div></div>
    <div class="reward-text" id="modal-reward"></div>
    <div id="gem-warning" class="gem-warning" style="display:none"></div>
    <div class="modal-buttons" id="modal-buttons"></div>
  </div>
</div>

<!-- WINNER -->
<div id="winner-screen">
  <span style="font-size:3rem;animation:pulse 1s infinite">✨</span>
  <h1>¡GANADOR!</h1>
  <div id="winner-name"></div>
  <div style="color:var(--gold);font-family:'Cinzel',serif;font-size:1.1rem" id="winner-stats"></div>
  <button class="play-again-btn" onclick="location.reload()">🔮 Jugar de Nuevo</button>
</div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const HOUSE_COLORS = { G:'#740001', S:'#1a472a', R:'#0e1a40', H:'#ecb939' };
const HOUSE_NAMES  = { G:'Gryffindor', S:'Slytherin', R:'Ravenclaw', H:'Hufflepuff' };
const PAWN_EMOJI   = ['🦁','🐍','🦅','🦡','⚡','🔮','🌟','✨'];
const PAWN_COLORS  = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];
const WINNING_SCORE = 200;

const T = { FELIX:'felix', OWL:'owl', JAIL:'jail', ACTIVITY:'activity', POINTS:'points', START:'start' };

// ── Activities (36 cells) ──
const ACTIVITIES = [
  { id:0,  name:'Inicio',              icon:'🏰', type:T.START,    pts:0,
    desc:'Tu historia en Hogwarts comienza.',
    instruction:'Lanza el dado para comenzar tu aventura mágica.',
    badge:'🏁 INICIO', badgeColor:'#8b6914', badgeBg:'#ffd966' },

  { id:1,  name:'Crisomela Mágica',    icon:'🦎', type:T.ACTIVITY, pts:20,
    desc:'Una Crisomela Mágica bloquea tu camino.',
    instruction:'🎭 MÍMICA: Actúa una criatura mágica de HP sin hablar ni hacer sonidos. Tu equipo tiene 30 segundos para adivinar.',
    badge:'🎭 MÍMICA', badgeColor:'#1a5c2a', badgeBg:'#c8f5d5', timer:30 },

  { id:2,  name:'Brujería Básica',     icon:'⚡', type:T.POINTS,   pts:10,
    desc:'Demostraste talento en Brujería Básica.',
    instruction:'¡Avanzas directo! Ganas puntos por tu destreza.',
    badge:'✨ PUNTOS', badgeColor:'#8b6914', badgeBg:'#ffd966' },

  { id:3,  name:'Lechuza Escapó',      icon:'🦉', type:T.OWL,      pts:0, gem:-20,
    desc:'¡Tu lechuza escapó con el mensaje importantísimo!',
    instruction:'🦉 Paga 20 💎 GEMAS para recuperar el mensaje y continuar.',
    badge:'🦉 PENALIZACIÓN', badgeColor:'#8b0000', badgeBg:'#ffe0e0' },

  { id:4,  name:'Felix Felicis',       icon:'🍀', type:T.FELIX,    pts:50,
    desc:'¡Encontraste una dosis de Felix Felicis, la poción de la Suerte!',
    instruction:'🍀 ¡La suerte te sonríe! Ganas 50 puntos Y tienes ventaja en la siguiente actividad.',
    badge:'🍀 FELIX FELICIS', badgeColor:'#b8860b', badgeBg:'#fff8dc' },

  { id:5,  name:'Expecto Patronum',    icon:'🦌', type:T.ACTIVITY, pts:30,
    desc:'Los Dementores se acercan. ¡Invoca tu Patronus!',
    instruction:'🎭 MÍMICA: Actúa el Patronus de un mago (Harry=ciervo, Hermione=nutria, Luna=liebre, Snape=cierva). ¡Sin sonidos! 30 seg.',
    badge:'🎭 MÍMICA', badgeColor:'#1a5c2a', badgeBg:'#c8f5d5', timer:30 },

  { id:6,  name:'Clase de Pociones',   icon:'🧪', type:T.ACTIVITY, pts:20,
    desc:'Snape te hace una pregunta sorpresa en Pociones.',
    instruction:'❓ TRIVIA: Di 3 ingredientes que se usen en pociones del mundo HP en 15 segundos.',
    badge:'❓ TRIVIA', badgeColor:'#0e1a40', badgeBg:'#d0e4ff', timer:15 },

  { id:7,  name:'Detención con Snape', icon:'🧙‍♂️', type:T.JAIL,
    desc:'¡Snape te mandó a detención en el calabozo!',
    instruction:'"No hay excusas, y no hay salida." — Severus Snape. Pierdes tu próximo turno.',
    badge:'⛓️ CÁRCEL', badgeColor:'#ffffff', badgeBg:'#8b0000' },

  { id:8,  name:'Espejo de Oesed',     icon:'🪞', type:T.ACTIVITY, pts:25,
    desc:'El Espejo de Oesed revela quién eres en el fondo.',
    instruction:'🤔 ¿QUIÉN SOY?: Los demás jugadores saben que eres un personaje de HP. Haz preguntas de SÍ/NO para adivinar. Máximo 10 preguntas.',
    badge:'🤔 ¿QUIÉN SOY?', badgeColor:'#4a0080', badgeBg:'#ead5ff' },

  { id:9,  name:'Mapa del Merodeador', icon:'🗺️', type:T.ACTIVITY, pts:30,
    desc:'El Mapa del Merodeador revela una palabra secreta.',
    instruction:'🔐 PASSWORD: Da solo UNA palabra pista para que tu equipo adivine la palabra secreta del mundo HP. ¡Sin señas!',
    badge:'🔐 PASSWORD', badgeColor:'#1a5c2a', badgeBg:'#c8f5d5' },

  { id:10, name:'Biblioteca de Hogwarts',icon:'📚',type:T.ACTIVITY, pts:20,
    desc:'La señora Pince te reta con un examen de conocimientos.',
    instruction:'📋 DAME 3: Di 3 hechizos del mundo HP en 10 segundos. ¡Sin repetir!',
    badge:'📋 DAME 3', badgeColor:'#8b6914', badgeBg:'#fff3cd', timer:10 },

  { id:11, name:'Práctica de Quidditch',icon:'🧹',type:T.POINTS,   pts:10,
    desc:'Entrenaste duro en el campo de Quidditch.',
    instruction:'¡Buen vuelo! Puntos directos.',
    badge:'✨ PUNTOS', badgeColor:'#8b6914', badgeBg:'#ffd966' },

  { id:12, name:'Hechizo Virelenguas', icon:'👅', type:T.ACTIVITY, pts:25,
    desc:'¡Un hechizo enreda tu lengua! Debes romperlo hablando.',
    instruction:'👅 TRABALENGUAS: Di "Wingardium Leviosa, Lumos Maxima, Expelliarmus Magnifico" 3 veces seguidas lo más rápido posible. ¡El grupo juzga!',
    badge:'👅 TRABALENGUAS', badgeColor:'#4a0080', badgeBg:'#ead5ff' },

// ── Board cell positions as % [top, left, width, height] ──
// Mapped to the real board image (10x10 logical grid)
// Outer path goes: bottom row L→R, right col T→B, top row R→L, left col B→T, inner sections
const CELL_PCT = [
  // Bottom row left→right (cells 0-9)
  [85,5,9,8],[85,15,9,8],[85,25,9,8],[85,35,9,8],[85,45,9,8],
  [85,55,9,8],[85,65,9,8],[85,75,9,8],[85,85,9,8],
  // Right col top→bottom (cells 9-17) — reuse cell 9 as right-col start
  [75,85,9,8],[65,85,9,8],[55,85,9,8],[45,85,9,8],[35,85,9,8],
  [25,85,9,8],[15,85,9,8],[5,85,9,8],
  // Top row right→left (cells 17-25)
  [5,75,9,8],[5,65,9,8],[5,55,9,8],[5,45,9,8],[5,35,9,8],
  [5,25,9,8],[5,15,9,8],[5,5,9,8],
  // Left col bottom→top (cells 25-33)
  [15,5,9,8],[25,5,9,8],[35,5,9,8],[45,5,9,8],[55,5,9,8],
  [65,5,9,8],[75,5,9,8],
  // Inner bottom row (cells 32-34)
  [75,15,9,8],[75,25,9,8],[75,35,9,8],
  // Final cell inner
  [65,35,9,8],
];

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
let players = [], currentPlayerIndex = 0, rolling = false, waitingForActivity = false, timerInterval = null;
const diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
let selectedCount = 4;

// ══════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════
function setPlayerCount(n, btn) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPlayerForm(n);
}

function renderPlayerForm(n) {
  const form = document.getElementById('players-form');
  const names = ['Harry','Hermione','Ron','Neville','Luna','Ginny','Draco','Cedric'];
  const houses = ['G','G','G','G','R','G','S','H'];
  form.innerHTML = '';
  for (let i = 0; i < n; i++) {
    form.innerHTML += `
      <div class="player-row">
        <div class="house-dot house-${houses[i]}" id="dot-${i}"></div>
        <input type="text" value="${names[i]}" id="pname-${i}" />
        <select class="house-select" id="phouse-${i}" onchange="updateDot(${i})">
          <option value="G" ${houses[i]==='G'?'selected':''}>🦁 Griff</option>
          <option value="S" ${houses[i]==='S'?'selected':''}>🐍 Slyth</option>
          <option value="R" ${houses[i]==='R'?'selected':''}>🦅 Rave</option>
          <option value="H" ${houses[i]==='H'?'selected':''}>🦡 Huffle</option>
        </select>
      </div>`;
  }
}

function updateDot(i) {
  const h = document.getElementById(`phouse-${i}`).value;
  document.getElementById(`dot-${i}`).className = `house-dot house-${h}`;
}

function startGame() {
  players = [];
  for (let i = 0; i < selectedCount; i++) {
    players.push({
      name: document.getElementById(`pname-${i}`).value || `Jugador ${i+1}`,
      house: document.getElementById(`phouse-${i}`).value,
      position: 0, points: 0, gems: 50, skipTurn: false,
      color: PAWN_COLORS[i], emoji: PAWN_EMOJI[i]
    });
  }
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  renderPlayers();
  renderPawns();
  updateTurnInfo();
}

renderPlayerForm(4);

// ══════════════════════════════════════════
// BOARD IMAGE — embedded base64
// ══════════════════════════════════════════
// Set in JS after page load
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('board-img').src = BOARD_IMAGE_SRC;
});

// ══════════════════════════════════════════
// PLAYERS UI
// ══════════════════════════════════════════
function renderPlayers() {
  const left = document.getElementById('left-panel');
  const right = document.getElementById('right-panel');
  // Keep turn info div in left panel
  const turnDiv = document.getElementById('turn-info-left')?.parentElement;
  left.innerHTML = '';
  if (turnDiv) left.appendChild(turnDiv);
  right.innerHTML = '';

  players.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'player-card' + (i === currentPlayerIndex ? ' active-turn' : '');
    card.innerHTML = `
      <div class="player-name">
        <span style="width:10px;height:10px;border-radius:50%;background:${p.color};display:inline-block;border:1px solid white;flex-shrink:0"></span>
        ${p.emoji} ${p.name}
      </div>
      <div style="font-size:.65rem;color:${HOUSE_COLORS[p.house]};font-weight:700;margin-bottom:.3rem">${HOUSE_NAMES[p.house]}</div>
      <div class="stats">
        <span class="stat-badge pts">⭐ ${p.points}</span>
        <span class="stat-badge gems">💎 ${p.gems}</span>
        <span class="stat-badge">📍 #${p.position}</span>
      </div>
      ${p.skipTurn ? '<span class="jail-badge">⛓️ Turno perdido</span>' : ''}`;
    if (i < 4) left.appendChild(card);
    else right.appendChild(card);
  });
}

function renderPawns() {
  document.querySelectorAll('.pawn').forEach(p => p.remove());
  const wrapper = document.getElementById('board-wrapper');
  const W = wrapper.offsetWidth, H = wrapper.offsetHeight;

  players.forEach((p, i) => {
    const pos = CELL_PCT[Math.min(p.position, CELL_PCT.length - 1)];
    if (!pos) return;
    const [topPct, leftPct] = pos;
    const offsetX = (i % 3) * 8;
    const offsetY = Math.floor(i / 3) * 8;
    const pawn = document.createElement('div');
    pawn.className = 'pawn';
    pawn.id = `pawn-${i}`;
    pawn.style.background = p.color;
    pawn.style.top  = `calc(${topPct}% + ${offsetY}px)`;
    pawn.style.left = `calc(${leftPct}% + ${offsetX}px)`;
    pawn.textContent = p.emoji;
    pawn.title = p.name;
    wrapper.appendChild(pawn);
  });
}

function updateTurnInfo() {
  const p = players[currentPlayerIndex];
  const el = document.getElementById('turn-info-left');
  if (el) el.textContent = `${p.emoji} ${p.name}`;
  document.getElementById('roll-btn').disabled = false;
}

// ══════════════════════════════════════════
// DICE
// ══════════════════════════════════════════
function rollDice() {
  if (rolling || waitingForActivity) return;
  const p = players[currentPlayerIndex];
  if (p.skipTurn) {
    p.skipTurn = false;
    addLog(`⛓️ ${p.name} estaba en el calabozo. Turno saltado.`);
    nextTurn(); return;
  }
  rolling = true;
  document.getElementById('roll-btn').disabled = true;
  const dEl = document.getElementById('dice-display');
  dEl.classList.add('rolling');
  let n = 0;
  const iv = setInterval(() => {
    dEl.textContent = diceFaces[Math.floor(Math.random()*6)];
    if (++n > 10) {
      clearInterval(iv);
      dEl.classList.remove('rolling');
      const result = Math.floor(Math.random()*6)+1;
      dEl.textContent = diceFaces[result-1];
      movePlayer(currentPlayerIndex, result);
      rolling = false;
    }
  }, 80);
}

function movePlayer(idx, steps) {
  const p = players[idx];
  p.position = Math.min(p.position + steps, ACTIVITIES.length - 1);
  addLog(`🎲 ${p.name} avanzó ${steps} → casilla #${p.position} (${ACTIVITIES[p.position].name})`);
  renderPawns();
  renderPlayers();
  setTimeout(() => triggerCell(p.position), 500);
  if (p.position >= ACTIVITIES.length - 1 || p.points >= WINNING_SCORE) {
    setTimeout(() => showWinner(), 1500);
  }
}

// ══════════════════════════════════════════
// CELL TRIGGER
// ══════════════════════════════════════════
function triggerCell(idx) {
  const act = ACTIVITIES[idx];
  const p = players[currentPlayerIndex];
  if (act.type === T.START) { nextTurn(); return; }
  if (act.type === T.POINTS) {
    p.points += act.pts;
    addLog(`⭐ ${p.name} +${act.pts} pts → Total: ${p.points}`);
    renderPlayers();
    nextTurn(); return;
  }
  showModal(act, p);
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function showModal(act, player) {
  waitingForActivity = true; clearTimer();
  document.getElementById('modal-icon').textContent = act.icon;
  document.getElementById('modal-title').textContent = act.name;
  document.getElementById('modal-desc').textContent = act.desc;
  document.getElementById('modal-instruction').textContent = act.instruction;
  const badge = document.getElementById('modal-badge');
  badge.textContent = act.badge;
  badge.style.color = act.badgeColor || '#8b6914';
  badge.style.background = act.badgeBg || '#ffd966';
  const reward = document.getElementById('modal-reward');
  if (act.type === T.OWL)  { reward.textContent = 'Costo: 20 💎 Gemas'; reward.style.color='#8b0000'; }
  else if (act.type === T.JAIL) { reward.textContent = '⛓️ Pierdes tu próximo turno'; reward.style.color='#8b0000'; }
  else if (act.pts)         { reward.textContent = `🏆 Premio: ${act.pts} puntos`; reward.style.color='var(--dark-gold)'; }
  else                      { reward.textContent = ''; }
  const gemW = document.getElementById('gem-warning');
  if (act.type === T.OWL && player.gems < 20) {
    gemW.style.display='block';
    gemW.textContent=`⚠️ ${player.name} no tiene suficientes gemas (${player.gems}/20). ¡Pierde 10 puntos!`;
  } else { gemW.style.display='none'; }
  const btns = document.getElementById('modal-buttons');
  btns.innerHTML = '';
  if (act.type === T.JAIL) {
    addBtn(btns,'btn-neutral','⛓️ Al calabozo','jail');
  } else if (act.type === T.OWL) {
    addBtn(btns,'btn-neutral', player.gems>=20?'💎 Pagar 20 Gemas':'😰 Pagar penalización','owl');
  } else {
    addBtn(btns,'btn-success','✅ ¡Lo logré!','success');
    addBtn(btns,'btn-fail','❌ No lo logré','fail');
  }
  if (act.timer && act.type !== T.JAIL && act.type !== T.OWL) {
    document.getElementById('timer-bar').style.display='block';
    startTimer(act.timer);
  } else { document.getElementById('timer-bar').style.display='none'; }
  document.getElementById('activity-modal').classList.add('show');
}

function addBtn(container, cls, label, result) {
  const b = document.createElement('button');
  b.className = cls; b.textContent = label;
  b.onclick = () => closeModal(result);
  container.appendChild(b);
}

function startTimer(sec) {
  const fill = document.getElementById('timer-fill');
  fill.style.width='100%'; fill.style.background='linear-gradient(90deg,#2e8b57,#ffd700,#c0392b)';
  let rem = sec;
  timerInterval = setInterval(() => {
    rem -= 0.1;
    fill.style.width = Math.max(0,(rem/sec)*100)+'%';
    if (rem <= 0) { clearInterval(timerInterval); fill.style.background='#e74c3c'; }
  }, 100);
}

function clearTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval=null; } }

function closeModal(result) {
  clearTimer();
  const act = ACTIVITIES[players[currentPlayerIndex].position];
  const p = players[currentPlayerIndex];
  document.getElementById('activity-modal').classList.remove('show');
  if (result==='success') {
    p.points += act.pts||0;
    if (act.type===T.FELIX) p.gems += 10;
    addLog(`✅ ${p.name} completó "${act.name}" → +${act.pts} pts. Total: ${p.points}`);
  } else if (result==='fail') {
    addLog(`❌ ${p.name} no completó "${act.name}".`);
  } else if (result==='owl') {
    if (p.gems>=20) { p.gems-=20; addLog(`🦉 ${p.name} pagó 20 💎. Gemas: ${p.gems}`); }
    else { p.points=Math.max(0,p.points-10); addLog(`🦉 ${p.name} sin gemas. -10 pts. Total: ${p.points}`); }
  } else if (result==='jail') {
    p.skipTurn=true; addLog(`⛓️ ${p.name} al calabozo. Pierde próximo turno.`);
  }
  renderPlayers(); waitingForActivity=false;
  if (p.points>=WINNING_SCORE) { showWinner(); return; }
  nextTurn();
}

function nextTurn() {
  currentPlayerIndex = (currentPlayerIndex+1) % players.length;
  renderPlayers(); updateTurnInfo();
}

function addLog(text) {
  const log = document.getElementById('log-entries');
  const e = document.createElement('div'); e.className='log-entry'; e.textContent=text;
  log.insertBefore(e, log.firstChild);
  if (log.children.length>30) log.removeChild(log.lastChild);
}

function showWinner() {
  const w = players.reduce((a,b)=>a.points>b.points?a:b);
  document.getElementById('winner-name').textContent=`${w.emoji} ${w.name} — ${HOUSE_NAMES[w.house]}`;
  document.getElementById('winner-stats').textContent=`⭐ ${w.points} puntos · 💎 ${w.gems} gemas`;
  document.getElementById('winner-screen').classList.add('show');
}
</script>
